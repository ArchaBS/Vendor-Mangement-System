<div class="login-container">
  <div class="text-center mb-4">
    <h2 class="text-black">Vendor Management System</h2>
  </div>

  <div class="card login-card shadow">

    <h3 class="text-center mb-4">Login Page</h3>

    
    <div *ngIf="successMessage" class="alert alert-success text-center py-2">
      ✅ {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger text-center py-2">
      ❌ {{ errorMessage }}
    </div>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text"
             class="form-control"
             [(ngModel)]="username"
             placeholder="Enter username">
    </div>

    <div class="mb-3 position-relative">
      <label class="form-label">Password</label>
      <input [type]="showPassword ? 'text' : 'password'"
             class="form-control"
             [(ngModel)]="password"
             placeholder="Enter password">
      <i class="bi"
         [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
         (click)="togglePassword()"
         style="position:absolute; right:15px; top:38px; cursor:pointer;">
      </i>
    </div>

    <button class="btn btn-primary w-100 mb-2"
            (click)="loginUser()">
      Login
    </button>

    <button class="btn btn-outline-secondary w-100"
            (click)="goToRegister()">
      Register
    </button>

  </div>

</div>
