<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <h2 class="text-center mb-4">Vendor Registration</h2>

      <div class="card p-4">

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" [(ngModel)]="username"
                 placeholder="Enter username">
        </div>

        <div class="mb-3 position-relative">
          <label class="form-label d-flex align-items-center">
            Password
            <span class="tooltip-icon ms-2"
                  data-tooltip="Password must be:
- At least 8 characters
- One uppercase letter
- One number
- One special character (!@#$%^&*)">
              
            </span>
          </label>
          <input [type]="showPassword ? 'text' : 'password'"
                 class="form-control"
                 [(ngModel)]="password"
                 placeholder="Enter password">
          <i class="bi"
             [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
             (click)="showPassword = !showPassword"
             style="position:absolute; right:15px; top:38px; cursor:pointer;">
          </i>
        </div>

        <div class="mb-3 position-relative">
          <label class="form-label">Confirm Password</label>
          <input [type]="showConfirmPassword ? 'text' : 'password'"
                 class="form-control"
                 [(ngModel)]="confirmPassword"
                 placeholder="Re-enter password"
                 [class.is-invalid]="confirmPassword && password !== confirmPassword"
                 [class.is-valid]="confirmPassword && password === confirmPassword">
          <i class="bi"
             [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
             (click)="showConfirmPassword = !showConfirmPassword"
             style="position:absolute; right:15px; top:38px; cursor:pointer;">
          </i>
          <div class="invalid-feedback">Passwords do not match!</div>
          <div class="valid-feedback">Passwords match!</div>
        </div>

        <button class="btn btn-primary w-100"
                (click)="registerUser()"
                [disabled]="!password || !confirmPassword || password !== confirmPassword">
          Register
        </button>

      </div>
    </div>
  </div>
</div>
