<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-3 bg-light vh-100 p-3">
      <h4>Menu</h4>

      <button class="btn w-100 mb-2"
              [class.btn-success]="activeSection === 'add'"
              [class.btn-outline-success]="activeSection !== 'add'"
              (click)="activeSection = 'add'">
        ➕ Add Product
      </button>

      <button class="btn w-100 mb-2"
              [class.btn-warning]="activeSection === 'edit'"
              [class.btn-outline-warning]="activeSection !== 'edit'"
              (click)="activeSection = 'edit'">
        ✏️ Edit Product
      </button>

      <button class="btn w-100 mb-2"
              [class.btn-danger]="activeSection === 'delete'"
              [class.btn-outline-danger]="activeSection !== 'delete'"
              (click)="activeSection = 'delete'"
              [disabled]="products.length <= 2">
        🗑️ Delete Product
      </button>

      <hr>

      <button class="btn btn-outline-secondary w-100"
              routerLink="/dashboard">
        ← Back to Dashboard
      </button>
    </div>

    <!-- Right Panel -->
    <div class="col-9 p-4">

      <!-- ADD PRODUCT -->
      <div *ngIf="activeSection === 'add'">
        <h3>Add Product</h3>
        <div class="card p-4">

          <div class="mb-3">
            <label>Product Name</label>
            <input class="form-control" [(ngModel)]="product_name"
                   placeholder="Enter product name">
          </div>

          <div class="mb-3">
            <label>Description</label>
            <input class="form-control" [(ngModel)]="description"
                   placeholder="Enter description">
          </div>

          <div class="mb-3">
            <label>Price</label>
            <input type="number" class="form-control" [(ngModel)]="price"
                   placeholder="Enter price">
          </div>

          <div class="mb-3">
            <label>Quantity</label>
            <input type="number" class="form-control" [(ngModel)]="quantity"
                   placeholder="Enter quantity">
          </div>

          <div class="mb-3">
            <label>Image URL</label>
            <input class="form-control" [(ngModel)]="image_url"
                   placeholder="Paste image URL from Google/web">
          </div>

          <button class="btn btn-success w-100" (click)="saveProduct()">
            Save Product
          </button>

        </div>
      </div>

      <!-- EDIT PRODUCT -->
      <div *ngIf="activeSection === 'edit'">
        <h3>Edit Product</h3>
        <div class="card p-4">

          <div class="mb-3">
            <label>Product Name</label>
            <input class="form-control" [(ngModel)]="edit_product_name"
                   (input)="onProductSelectForEdit()"
                   placeholder="Type product name to load details">
          </div>

          <div class="mb-3">
            <label>Description</label>
            <input class="form-control" [(ngModel)]="edit_description">
          </div>

          <div class="mb-3">
            <label>Price</label>
            <input type="number" class="form-control" [(ngModel)]="edit_price">
          </div>

          <div class="mb-3">
            <label>Quantity</label>
            <input type="number" class="form-control" [(ngModel)]="edit_quantity">
          </div>

          <div class="mb-3">
            <label>Image URL</label>
            <input class="form-control" [(ngModel)]="edit_image_url"
                   placeholder="Paste new image URL">
          </div>

          <button class="btn btn-warning w-100" (click)="updateProduct()">
            Update Product
          </button>

        </div>
      </div>

      <!-- DELETE PRODUCT -->
      <div *ngIf="activeSection === 'delete'">
        <h3>Delete Product</h3>

        <!-- Warning if 2 or less products -->
        <div *ngIf="products.length <= 2" class="alert alert-warning">
          ⚠️ You need more than 2 products to delete. Please add more products first.
        </div>

        <div class="card p-4" *ngIf="products.length > 2">
          <div class="mb-3">
            <label>Product Name</label>
            <input class="form-control" [(ngModel)]="delete_product_name"
                   placeholder="Type product name to delete">
          </div>

          <button class="btn btn-danger w-100" (click)="deleteProduct()">
            Delete Product
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
